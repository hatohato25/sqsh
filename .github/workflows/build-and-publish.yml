name: Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_call:
    inputs:
      tag_name:
        description: 'Tag name to build (e.g. v0.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create tarball
        id: tarball
        run: |
          TARBALL="sqsh-${{ inputs.tag_name || github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "$TARBALL" -C target/${{ matrix.target }}/release sqsh
          shasum -a 256 "$TARBALL" > "$TARBALL.sha256"
          echo "name=$TARBALL" >> $GITHUB_OUTPUT
          echo "sha256=$(shasum -a 256 $TARBALL | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            ${{ steps.tarball.outputs.name }}
            ${{ steps.tarball.outputs.name }}.sha256

    outputs:
      sha256: ${{ steps.tarball.outputs.sha256 }}
      target: ${{ matrix.target }}

  update-formula:
    name: Update Homebrew Formula
    needs: build
    runs-on: ubuntu-slim
    steps:
      - name: Checkout homebrew-sqsh
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: hatohato25/homebrew-sqsh
          token: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}

      - name: Download sha256 files from release
        run: |
          VERSION="${{ inputs.tag_name || github.ref_name }}"
          BASE_URL="https://github.com/hatohato25/sqsh/releases/download/${VERSION}"

          # sha256ファイルの形式は "<sha256値>  <ファイル名>" のため awk で先頭フィールドを取得する
          AARCH64_SHA256=$(curl -fsSL "${BASE_URL}/sqsh-${VERSION}-aarch64-apple-darwin.tar.gz.sha256" | awk '{print $1}')
          X86_64_SHA256=$(curl -fsSL "${BASE_URL}/sqsh-${VERSION}-x86_64-apple-darwin.tar.gz.sha256" | awk '{print $1}')

          echo "AARCH64_SHA256=$AARCH64_SHA256" >> $GITHUB_ENV
          echo "X86_64_SHA256=$X86_64_SHA256" >> $GITHUB_ENV
          echo "VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Update Formula
        run: |
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/sqsh.rb
          # 1番目のsha256（aarch64）を置換後、2番目（x86_64）を置換
          # 各sha256は1度しか現れないため、aarch64置換後にx86_64を置換する
          FIRST_SHA=$(grep -m1 'sha256 "[a-f0-9]*"' Formula/sqsh.rb | grep -o '"[a-f0-9]*"' | tr -d '"')
          SECOND_SHA=$(grep 'sha256 "[a-f0-9]*"' Formula/sqsh.rb | tail -1 | grep -o '"[a-f0-9]*"' | tr -d '"')
          sed -i "s/sha256 \"${FIRST_SHA}\"/sha256 \"${AARCH64_SHA256}\"/" Formula/sqsh.rb
          sed -i "s/sha256 \"${SECOND_SHA}\"/sha256 \"${X86_64_SHA256}\"/" Formula/sqsh.rb
          echo "Updated: version=${VERSION}, aarch64=${AARCH64_SHA256}, x86_64=${X86_64_SHA256}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sqsh.rb
          git commit -m "Update sqsh to v${VERSION}"
          git push
