name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create tarball
        id: tarball
        run: |
          TARBALL="sqsh-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar -czf "$TARBALL" -C target/${{ matrix.target }}/release sqsh
          shasum -a 256 "$TARBALL" > "$TARBALL.sha256"
          echo "name=$TARBALL" >> $GITHUB_OUTPUT
          echo "sha256=$(shasum -a 256 $TARBALL | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ${{ steps.tarball.outputs.name }}
            ${{ steps.tarball.outputs.name }}.sha256

    outputs:
      sha256: ${{ steps.tarball.outputs.sha256 }}
      target: ${{ matrix.target }}

  update-formula:
    name: Update Homebrew Formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-sqsh
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: hatohato25/homebrew-sqsh
          token: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}

      - name: Download sha256 files from release
        run: |
          VERSION="${{ github.ref_name }}"
          BASE_URL="https://github.com/hatohato25/sqsh/releases/download/${VERSION}"

          # sha256ファイルの形式は "<sha256値>  <ファイル名>" のため awk で先頭フィールドを取得する
          AARCH64_SHA256=$(curl -fsSL "${BASE_URL}/sqsh-${VERSION}-aarch64-apple-darwin.tar.gz.sha256" | awk '{print $1}')
          X86_64_SHA256=$(curl -fsSL "${BASE_URL}/sqsh-${VERSION}-x86_64-apple-darwin.tar.gz.sha256" | awk '{print $1}')

          echo "AARCH64_SHA256=$AARCH64_SHA256" >> $GITHUB_ENV
          echo "X86_64_SHA256=$X86_64_SHA256" >> $GITHUB_ENV
          echo "VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Update Formula
        run: |
          # Formulaのversion・sha256をpython3で確実に書き換える
          # Formulaの構造は固定（on_arm が先、on_intel が後）のため出現順で区別する
          python3 - <<'PYEOF'
          import os, re

          formula_path = "Formula/sqsh.rb"
          version     = os.environ["VERSION"]
          aarch64_sha = os.environ["AARCH64_SHA256"]
          x86_64_sha  = os.environ["X86_64_SHA256"]

          with open(formula_path, "r") as f:
              content = f.read()

          # version行を置換
          content = re.sub(r'version "[^"]*"', f'version "{version}"', content)

          # sha256を出現順（1番目=aarch64、2番目=x86_64）に置換
          sha_pattern = re.compile(r'(sha256 ")[a-f0-9]+(")')
          count = 0
          def replace_sha(m):
              nonlocal count
              count += 1
              if count == 1:
                  return f'{m.group(1)}{aarch64_sha}{m.group(2)}'
              elif count == 2:
                  return f'{m.group(1)}{x86_64_sha}{m.group(2)}'
              return m.group(0)

          content = sha_pattern.sub(replace_sha, content)

          with open(formula_path, "w") as f:
              f.write(content)

          print(f"Updated: version={version}, aarch64={aarch64_sha}, x86_64={x86_64_sha}")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/sqsh.rb
          git commit -m "Update sqsh to v${VERSION}"
          git push
